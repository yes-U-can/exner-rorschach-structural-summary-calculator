name: Public document localization

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/localization/**"
      - "scripts/verify-public-document-locales.ps1"
      - "v2-nextjs/source/scripts/publish.ps1"
      - ".github/workflows/public-document-localization.yml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - "docs/localization/**"
      - "scripts/verify-public-document-locales.ps1"
      - "v2-nextjs/source/scripts/publish.ps1"
      - ".github/workflows/public-document-localization.yml"

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify five-language public document groups
        shell: pwsh
        run: ./scripts/verify-public-document-locales.ps1
